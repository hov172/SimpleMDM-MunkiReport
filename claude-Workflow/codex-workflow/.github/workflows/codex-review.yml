name: Codex PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Only run when @codex is mentioned in a PR comment
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@codex')

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex on PR comment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          COMMENT="${{ github.event.comment.body }}"

          # Extract instruction after @codex
          INSTRUCTION=$(echo "$COMMENT" | sed 's/@codex//' | tr -d '\n' | xargs)

          # Check out the PR branch
          gh pr checkout "$PR_NUMBER"

          # Run Codex with the instruction
          codex exec "$INSTRUCTION" \
            --approval-policy never \
            --sandbox workspace-write

          # If changes were made, commit and push them
          if ! git diff --quiet; then
            git config user.name "Codex"
            git config user.email "codex@openai.com"
            git add -A
            git commit -m "codex: $INSTRUCTION"
            git push
          fi

          # Post a comment with the result
          gh pr comment "$PR_NUMBER" --body "✅ Codex completed: $INSTRUCTION"
